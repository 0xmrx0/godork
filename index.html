<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GoDork</title>
<style>
  :root{
    --bg:#0f1115; --elev:#1a1d24; --elev2:#232730;
    --border:#2a2f3a; --text:#e6e6e6; --dim:#8a8f9b;
    --accent:#ff2d2d; --blue:#4a9eff; --hover:#2a2f3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;justify-content:center;padding-top:90px;
  }
  .wrap{width:100%;max-width:720px;padding:0 20px;position:relative}

  /* LOGO */
  .logo-box{text-align:center;margin-bottom:32px}
  .logo-img{max-width:220px;height:auto}
  .tagline{color:var(--dim);font-size:14px;margin-top:10px}

  /* SEARCH BAR */
  .bar{
    display:flex;align-items:center;background:var(--elev);
    border:1px solid var(--border);border-radius:999px;
    padding:6px 6px 6px 14px;gap:8px;transition:border-color .2s;
  }
  .bar:focus-within{border-color:var(--blue)}
  .pill{
    display:flex;align-items:center;gap:6px;padding:6px 12px;
    border-radius:999px;cursor:pointer;font-size:14px;
    transition:background .15s;white-space:nowrap;user-select:none;
  }
  .pill:hover{background:var(--hover)}
  .caret{font-size:10px;color:var(--dim)}
  .sep{width:1px;height:20px;background:var(--border)}
  #q{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text);font-size:15px;padding:10px 8px;
  }
  #q::placeholder{color:var(--dim)}
  .go{
    background:transparent;border:none;color:var(--dim);
    font-size:16px;cursor:pointer;padding:8px 12px;border-radius:50%;
  }
  .go:hover{background:var(--hover);color:var(--text)}

  /* CHIP */
  .chip-row{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--elev);border:1px solid var(--border);
    padding:6px 12px;border-radius:999px;font-size:12px;color:var(--dim);
  }
  .chip .x{cursor:pointer}.chip .x:hover{color:var(--accent)}

  /* DROPDOWNS */
  .dd{
    position:absolute;display:none;background:var(--elev);
    border:1px solid var(--border);border-radius:12px;padding:8px 0;
    box-shadow:0 12px 40px rgba(0,0,0,.45);
    z-index:50;min-width:280px;max-height:70vh;overflow-y:auto;
  }
  .dd.show{display:block}
  #modDD{top:calc(100% + 8px);left:20px}
  #engDD{top:calc(100% + 8px);left:180px;min-width:180px}
  #payDD{top:calc(100% + 8px);left:320px;min-width:380px;max-width:480px}

  .grp{font-size:11px;color:var(--dim);text-transform:uppercase;
       letter-spacing:1px;padding:10px 16px 6px;font-weight:600}
  .it{display:flex;align-items:center;gap:10px;padding:10px 16px;
      cursor:pointer;font-size:14px;transition:background .1s}
  .it:hover,.it.active{background:var(--hover)}
  .it .ic{width:22px;text-align:center}
  .it .nm{flex:1}
  .it .ct{background:var(--elev2);color:var(--dim);font-size:11px;
          padding:2px 8px;border-radius:10px}

  .p-hd{padding:12px 16px;border-bottom:1px solid var(--border);
        font-size:13px;color:var(--dim);font-weight:600}
  .p-it{padding:10px 16px;cursor:pointer;font-size:13px;
        font-family:"SF Mono",Consolas,monospace;word-break:break-all}
  .p-it:hover{background:var(--hover);color:var(--blue)}

  .dd::-webkit-scrollbar{width:6px}
  .dd::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  @media(max-width:640px){
    #payDD{left:20px;right:20px;min-width:0}
    #modDD{left:20px;right:20px}
  }
</style>
</head>
<body>
<main class="wrap">

  <div class="logo-box">
    <img src="logo.png" alt="GoDork" class="logo-img"/>
    <p class="tagline">Find what they forgot to hide.</p>
  </div>

  <div class="bar">
    <div class="pill" id="modPill"><span id="modLbl">select module</span><span class="caret">▾</span></div>
    <div class="sep"></div>
    <div class="pill" id="engPill"><span>🔎</span><span id="engLbl">Google</span><span class="caret">▾</span></div>
    <input id="q" placeholder="Search and find anything..." autocomplete="off"/>
    <button class="go" id="goBtn">🔍</button>
  </div>

  <div class="chip-row" id="chipRow"></div>

  <div class="dd" id="modDD"></div>
  <div class="dd" id="payDD"></div>
  <div class="dd" id="engDD"></div>

</main>

<script>
/* ---------- DATA ---------- */
const DB = {
  PASSWORDS:{
    "admin / panels":{ic:"📱",p:[
      'intitle:"admin login"','inurl:admin/login.php',
      'intitle:"admin panel" inurl:admin','inurl:/wp-admin/ intitle:"login"',
      'intitle:"phpMyAdmin"','inurl:/administrator/index.php',
      'intitle:"cPanel Login"','intitle:"Plesk Login"',
      'inurl:"/admin/dashboard"','intitle:"login" inurl:admin'
    ]},
    "env / secrets":{ic:"⭐",p:[
      'filetype:env "DB_PASSWORD"','intitle:"index of" .env',
      'ext:env intext:"APP_KEY"','filetype:env "AWS_SECRET"',
      'filetype:env "JWT_SECRET"','ext:env "DATABASE_URL"',
      'filetype:env "FIREBASE"','filetype:env "REDIS_PASSWORD"'
    ]},
    "passwords / files":{ic:"🔑",p:[
      'filetype:txt intext:"password"','filetype:log intext:"password"',
      'intitle:"index of" passwd','filetype:sql "password"',
      'inurl:passwords.txt','filetype:bak password',
      'filetype:csv "password"','filetype:ini "password"'
    ]}
  },
  DATABASE:{
    "database / exposed":{ic:"💾",p:[
      'intitle:"index of" *.sql','filetype:sql "INSERT INTO"',
      'inurl:phpmyadmin/index.php','filetype:sql "CREATE TABLE"',
      'inurl:/adminer.php','filetype:sqlite',
      'filetype:db "users"','inurl:pgadmin'
    ]},
    "config / files":{ic:"⚙️",p:[
      'filetype:cfg "password"','filetype:conf intext:"password"',
      'inurl:web.config','filetype:ini "mysql password"',
      'inurl:wp-config.php.bak','filetype:yml "password"',
      'filetype:json "api_key"','inurl:settings.py "SECRET_KEY"'
    ]}
  },
  SENSITIVE:{
    "sensitive / dirs":{ic:"📁",p:[
      'intitle:"index of /backup"','intitle:"index of /private"',
      'intitle:"index of /admin"','intitle:"index of" ".git"',
      'intitle:"index of /logs"','intitle:"index of /.ssh"',
      'intitle:"index of /keys"','intitle:"index of /secret"'
    ]},
    "usernames / accounts":{ic:"👤",p:[
      'filetype:txt "username" "password"',
      'filetype:csv intext:"email" intext:"password"',
      'filetype:xls "username"','filetype:sql "users" "email"',
      'filetype:json "users"','intitle:"index of" accounts.db'
    ]}
  },
  CLOUD:{
    "api / keys":{ic:"🗝️",p:[
      'intext:"AIza" filetype:env','"AWS_ACCESS_KEY_ID" filetype:env',
      'intext:"sk_live_" filetype:log','filetype:json "client_secret"',
      'intext:"ghp_" site:github.com','intext:"AKIA" filetype:log',
      'filetype:js "apiKey:"','"firebaseConfig" filetype:js'
    ]}
  },
  SERVER:{
    "server / info":{ic:"🖥️",p:[
      'intitle:"Apache2 Ubuntu Default Page"','intitle:"phpinfo()"',
      'intitle:"Welcome to nginx!"','inurl:server-status',
      'intitle:"IIS Windows Server"','intitle:"Tomcat"',
      'inurl:/actuator/health'
    ]},
    "vuln / files":{ic:"⚡",p:[
      'inurl:"/.git/" intitle:"index of"','inurl:".svn/entries"',
      'filetype:log "stack trace"','inurl:wp-content/debug.log',
      'inurl:".DS_Store"','inurl:/phpinfo.php',
      'filetype:log "SQL syntax"','inurl:"/wp-json/wp/v2/users"'
    ]}
  }
};
const ENG = [
  {n:"Google",i:"🔎",u:"https://www.google.com/search?q="},
  {n:"Bing",i:"🅱️",u:"https://www.bing.com/search?q="},
  {n:"DuckDuckGo",i:"🦆",u:"https://duckduckgo.com/?q="},
  {n:"Yandex",i:"🟥",u:"https://yandex.com/search/?text="},
  {n:"Shodan",i:"🛰️",u:"https://www.shodan.io/search?query="}
];

/* ---------- STATE ---------- */
const S = {eng:ENG[0], mod:null, pay:null};
const $ = s => document.querySelector(s);
const modDD=$("#modDD"), engDD=$("#engDD"), payDD=$("#payDD");
const modLbl=$("#modLbl"), engLbl=$("#engLbl");
const q=$("#q"), chipRow=$("#chipRow");

/* ---------- BUILD MODULES ---------- */
for(const g in DB){
  modDD.insertAdjacentHTML("beforeend",`<div class="grp">${g}</div>`);
  for(const name in DB[g]){
    const m = DB[g][name];
    const el = document.createElement("div");
    el.className = "it";
    el.innerHTML = `<span class="ic">${m.ic}</span><span class="nm">${name}</span><span class="ct">${m.p.length}</span>`;
    el.onmouseenter = ()=>{
      modDD.querySelectorAll(".it").forEach(i=>i.classList.remove("active"));
      el.classList.add("active");
      showPayloads(name, m);
    };
    el.onclick = e=>{e.stopPropagation(); showPayloads(name,m);};
    modDD.appendChild(el);
  }
}

/* ---------- PAYLOAD PANEL ---------- */
function showPayloads(name, m){
  payDD.innerHTML = `<div class="p-hd">${m.ic} ${name} — ${m.p.length} payloads</div>`;
  m.p.forEach(p=>{
    const el = document.createElement("div");
    el.className = "p-it";
    el.textContent = p;
    el.onclick = e=>{
      e.stopPropagation();
      S.mod = name; S.pay = p;
      modLbl.textContent = name;
      q.value = p;
      renderChip();
      closeAll();
      q.focus();
    };
    payDD.appendChild(el);
  });
  payDD.classList.add("show");
}

/* ---------- ENGINES ---------- */
ENG.forEach(e=>{
  const el = document.createElement("div");
  el.className = "it";
  el.innerHTML = `<span class="ic">${e.i}</span><span class="nm">${e.n}</span>`;
  el.onclick = ev=>{
    ev.stopPropagation();
    S.eng = e; engLbl.textContent = e.n;
    closeAll();
  };
  engDD.appendChild(el);
});

/* ---------- CHIP ---------- */
function renderChip(){
  chipRow.innerHTML = "";
  if(S.pay){
    const c = document.createElement("div");
    c.className = "chip";
    c.innerHTML = `<span>✓ ${S.mod}</span><span class="x">✕</span>`;
    c.querySelector(".x").onclick = ()=>{
      S.mod=null; S.pay=null;
      modLbl.textContent = "select module";
      q.value = "";
      chipRow.innerHTML = "";
    };
    chipRow.appendChild(c);
  }
}

/* ---------- OPEN / CLOSE ---------- */
function closeAll(){modDD.classList.remove("show");engDD.classList.remove("show");payDD.classList.remove("show");}
$("#modPill").onclick = e=>{
  e.stopPropagation();
  const open = modDD.classList.contains("show");
  closeAll(); if(!open) modDD.classList.add("show");
};
$("#engPill").onclick = e=>{
  e.stopPropagation();
  const open = engDD.classList.contains("show");
  closeAll(); if(!open) engDD.classList.add("show");
};
document.addEventListener("click", closeAll);
modDD.onclick = e=>e.stopPropagation();
payDD.onclick = e=>e.stopPropagation();

/* ---------- SEARCH ---------- */
function go(){
  const v = q.value.trim();
  if(!v){q.focus();return;}
  window.open(S.eng.u + encodeURIComponent(v), "_blank");
}
$("#goBtn").onclick = go;
q.onkeydown = e=>{if(e.key==="Enter") go();};
</script>
</body>
</html>
